name: CI/CD Pipeline

on:
  push:
    branches: [ main, ai-artifact, develop, unified-main ]
  pull_request:
    branches: [ main, ai-artifact, unified-main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov flake8
    
    - name: Lint with flake8
      run: |
        flake8 --exclude=.venv,*.txt,*.md,*.yml,*.yaml,*.json,*.csv,*.html,*.css,*.js,*.dockerfile,Dockerfile . --max-line-length=120 --ignore=E501,W503,E302,E305,W293,W291,W292
    
    - name: Initialize database
      run: |
        cd sr_screener
        python -c "from database import init_db; init_db()"
    
    - name: Run tests
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        VECTOR_STORE_ID: ${{ secrets.VECTOR_STORE_ID }}
      run: |
        pytest test_database_compatibility.py test_quick_validation.py final_production_test.py -v --tb=short

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ai-artifact' || github.ref == 'refs/heads/unified-main')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: |
        docker build -t deepresearch2:latest .
    
    - name: Test Docker container
      run: |
        # Create .env file for testing
        cp .env.docker .env.test
        sed -i 's/your_openai_api_key_here/test_key/g' .env.test
        
        # Run container with proper environment
        docker run -d --name test-container -p 8000:8000 -p 8001:8001 \
          -e OPENAI_API_KEY=test_key \
          -e DOCKER_CONTAINER=true \
          -e MCP_HOST=0.0.0.0 \
          -e MCP_PORT=8001 \
          -e STREAMLIT_HOST=0.0.0.0 \
          -e STREAMLIT_PORT=8000 \
          -e EXTERNAL_HOST=localhost \
          -e EXTERNAL_PORT=8001 \
          deepresearch2:latest
        
        # Wait for container to be ready using our health check
        timeout=60
        start_time=$(date +%s)
        while ! docker exec test-container curl -f http://localhost:8001/health >/dev/null 2>&1; do
          current_time=$(date +%s)
          if [ $((current_time - start_time)) -gt $timeout ]; then
            echo "Container failed to become ready within $timeout seconds"
            docker logs test-container
            docker stop test-container
            docker rm test-container
            exit 1
          fi
          echo "Waiting for container to be ready..."
          sleep 5
        done
        
        # Test MCP server endpoints
        echo "Testing MCP server endpoints..."
        docker exec test-container curl -s http://localhost:8001/health | grep "healthy" || exit 1
        docker exec test-container curl -s http://localhost:8001/sse/ || exit 1
        
        echo "Container is ready and endpoints are accessible!"
        docker logs test-container
        docker stop test-container
        docker rm test-container
        
    - name: Build and push Docker image for production
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/unified-main'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: deepresearch2:production
        cache-from: type=gha
        cache-to: type=gha,mode=max

  fly-deploy:
    needs: [test, docker]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/unified-main')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Fly.io CLI
      uses: superfly/flyctl-actions/setup-flyctl@master
    
    - name: Deploy to Fly.io
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        VECTOR_STORE_ID: ${{ secrets.VECTOR_STORE_ID }}
      run: |
        if [ -z "$FLY_API_TOKEN" ]; then
          echo "FLY_API_TOKEN is not set. Skipping deployment."
          echo "To deploy to Fly.io, add FLY_API_TOKEN to your repository secrets."
          exit 0
        fi
        
        # Deploy the application
        flyctl deploy --remote-only
        
        # Get the deployed app URL
        APP_NAME=$(flyctl info --json | jq -r '.Name')
        echo "Deployed to https://$APP_NAME.fly.dev"
        
        # Verify deployment
        flyctl status
