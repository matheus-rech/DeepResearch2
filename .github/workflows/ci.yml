name: CI/CD Pipeline

on:
  push:
    branches: [ main, ai-artifact, develop ]
  pull_request:
    branches: [ main, ai-artifact ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov flake8
    
    - name: Lint with flake8
      run: |
        flake8 --exclude=.venv . --max-line-length=120 --ignore=E501,W503,E302,E305,W293,W291,W292,F401,E265
    
    - name: Initialize database
      run: |
        cd sr_screener
        python -c "from database import init_db; init_db()"
    
    - name: Run tests
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        VECTOR_STORE_ID: ${{ secrets.VECTOR_STORE_ID }}
      run: |
        python test_database_compatibility.py
        python test_quick_validation.py
        python final_production_test.py

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ai-artifact')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: |
        docker build -t deepresearch2:latest .
    
    - name: Test Docker container
      run: |
        docker run -d --name test-container -p 8000:8000 -p 8001:8001 \
          -e OPENAI_API_KEY=test_key \
          deepresearch2:latest
        sleep 30
        docker logs test-container
        docker stop test-container
        docker rm test-container

  deploy:
    needs: [test, docker]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to production
      run: |
        echo "Production deployment would happen here"
        echo "Consider using services like Railway, Render, or cloud providers"
