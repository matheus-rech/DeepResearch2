repos:
  - repo: https://github.com/pycqa/flake8
    rev: 6.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=120, --ignore=E501,W503,E302,E305,E306,W293,W291,W292, --exclude=.venv,*.txt,*.md,*.yml,*.yaml,*.json,*.csv,*.html,*.css,*.js,*.dockerfile,Dockerfile]
  - repo: https://github.com/myint/autoflake
    rev: v2.2.1
    hooks:
      - id: autoflake
        args: [--remove-all-unused-imports, --remove-unused-variables, --in-place, --recursive, '.']
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        args: [--line-length=120]