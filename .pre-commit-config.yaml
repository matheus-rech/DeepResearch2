---
repos:
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        args: [--line-length=120]

  - repo: local
    hooks:
      - id: flake8
        name: flake8
        entry: flake8
        language: system
        types: [python]
        args:
          - --max-line-length=120
          - --ignore=E501,W503,E302,E305,W293,W291,W292
          - "--exclude=.venv,*.txt,*.md,*.yml,*.yaml,*.json,*.csv,*.html,*.css,*.js,*.dockerfile,Dockerfile"

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
