app = "deepresearch2"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  dockerfile = "Dockerfile"

[env]
  MCP_HOST = "0.0.0.0"
  MCP_PORT = "8001"
  STREAMLIT_HOST = "0.0.0.0"
  STREAMLIT_PORT = "8000"
  DOCKER_CONTAINER = "true"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 500

  [[http_service.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[http_service.ports]]
    port = 443
    handlers = ["tls", "http"]

  [http_service.http_options]
    response_timeout = "60s"

[services.streamlit]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[services.streamlit.ports]]
    port = 8000
    handlers = ["http"]

[metrics]
  port = 9091
  path = "/metrics"

[checks]
  [checks.health]
    port = 8001
    type = "http"
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/health"
    protocol = "http"
